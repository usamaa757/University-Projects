{% extends 'base.html' %}

{% block content %}
  <div class="container">
    <div class="page-header">
      <h2>💬 Create New Chat Room</h2>
    </div>

    <div class="form-container">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create Room</button>
      </form>
    </div>
  </div>
{% endblock %}
