{% extends 'base.html' %}
{% block content %}
  {% block css_extra %}
    <style>
      /* Cards */
      .lesson-card {
        background: #fff;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }
      
      /* Section */
      .section-title {
        font-size: 1.4rem;
        margin: 20px 0 10px;
        color: #4a6fa5;
      }
      
      .add-more-btn {
        background: #28a745;
        color: #fff;
        margin-bottom: 15px;
      }
      
      .add-more-btn:hover {
        background: #218838;
      }
      
      /* Form actions */
      .form-actions {
        text-align: right;
        margin-top: 20px;
      }
    </style>
  {% endblock %}
  <div class="container">
    <div class="page-header">
      <h2>Create Lesson</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="lesson-form">
      {% csrf_token %}

      <div class="lesson-details lesson-card">{{ lesson_form.as_p }}</div>

      <h3 class="section-title">Multimedia</h3>
      {{ formset.management_form }}
      <div id="formset-area">
        {% for form in formset %}
          <div class="media-form lesson-card">{{ form.as_p }}</div>
        {% endfor %}
      </div>

      <button type="button" id="add-more" class="btn add-more-btn">➕ Add More</button>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Lesson</button>
      </div>
    </form>
  </div>

  <script>
let formIdx = {{ formset.total_form_count }};
document.getElementById("add-more").onclick = function () {
  const formArea = document.getElementById("formset-area");
  const newForm = formArea.children[0].cloneNode(true);
  newForm.querySelectorAll("input, select, textarea").forEach(el => {
    el.name = el.name.replace(/-\d+-/, `-${formIdx}-`);
    el.id = el.id.replace(/-\d+-/, `-${formIdx}-`);
    if (el.type !== "hidden") el.value = "";
  });
  formArea.appendChild(newForm);
  formIdx++;
  document.getElementById("id_form-TOTAL_FORMS").value = formIdx;
}
</script>
{% endblock %}
