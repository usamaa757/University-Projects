{% include 'includes/header.html' %}


<h2 class="mt-4 text-center form-heading">Welcome to Online Book Exchange</h2>

<div class="container form-container">
    <div class="card form-card">
        <div class="card-header form-card-header">Register</div>
        <div class="card-body">

            <!-- Display Django Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password1" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="password2" class="form-control input-field" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile No</label>
                    <input type="text" name="mobile_no" class="form-control input-field" maxlength="11" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control input-field" rows="2" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Profile Picture</label>
                    <input type="file" name="profile_picture" class="form-control input-field" required>
                </div>

                <button type="submit" class="btn form-btn w-100">Register</button>
            </form>

            <p class="text-center mt-3">
                Already have an account? <a href="{% url 'login' %}" class="form-link">Login</a>
            </p>

        </div>
    </div>
</div>
{% include 'includes/footer.html' %}
