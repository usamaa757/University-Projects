{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Online Book Exchange</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container ">
            <a class="navbar-brand fw-bold" href="/">Book Exchange</a>
            <button class="navbar-toggler bg-light d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- If user is not logged in -->
                     {% if not user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link btn form-btn text-dark mx-2" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-light form-btn text-dark mx-2" href="{% url 'register' %}">Register</a>
                        </li>
                    {% else %}
                        <!-- If user is logged in -->
                        <li class="nav-item">
                            <div class="dropdown">
                                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                                    {% if user.profile_picture %}
                                        <img src="{{ user.profile_picture.url }}" alt="profile picture" width="30" height ="30" class="rounded-circle">
                                    {% else %}
                                        <img src="https://github.com/mdo.png" alt="profile picture" width="30" height ="30" class="rounded-circle">
                                    {% endif %}
                                    <span class="d-none d-sm-inline mx-1">{{ user.first_name }}</span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
                                    <li><a class="dropdown-item" href="#">Profile</a></li>
                                    <li><a class="dropdown-item" href="{% url 'logout' %}">Sign out</a></li>
                                </ul>
                            </div>
                        </li>
                   
                    {% endif %}
                </ul>
             
            </div>
            
        </div>
    </nav>
