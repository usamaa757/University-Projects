{% extends 'layout.html' %}

{% block content %}
  <div class="container mt-5">
    <h2 class="text-center mb-4">Popular Destinations</h2>
    <div class="row">
      {% for destination in destinations %}
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            {% if destination.image %}
              <img src="{{ destination.image.url }}" class="card-img-top" alt="{{ destination.name }}" style="height: 200px; object-fit: cover;" />
            {% endif %}
            <div class="card-body">
              <h5 class="card-title">{{ destination.name }}</h5>
              <p class="card-text">{{ destination.description|truncatechars:100 }}</p>
              <a href="{% url 'view_reviews' destination.id %}" class="btn btn-primary btn-sm">View Reviews</a>
              <a href="{% url 'upload_photos' destination.id %}" class="btn btn-success btn-sm">Upload Photos</a>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
