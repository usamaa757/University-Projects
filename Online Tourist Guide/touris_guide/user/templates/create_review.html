{% extends 'layout.html' %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm border rounded">
          <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Write a Review for {{ destination.name }}</h4>
          </div>
          <div class="card-body">
            <form method="POST">
              {% csrf_token %}

              <div class="mb-3">
                <label for="id_rating" class="form-label">Rating</label>
                {{ form.rating }}
              </div>

              <div class="mb-3">
                <label for="id_comment" class="form-label">Comment</label>
                {{ form.comment }}
              </div>

              <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Submit Review</button>
                <a href="{% url 'destination_list' %}" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
