{% extends 'layout.html' %}

{% block content %}
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-dark text-white text-center">
            <h4>Create Destination</h4>
          </div>
          <div class="card-body">
            {% if messages %}
              <div class="mt-3">
                {% for message in messages %}
                  <div class="text-success">{{ message }}</div>
                {% endfor %}
              </div>
            {% endif %}
            <form method="post" enctype="multipart/form-data">
              {% csrf_token %}

              <div class="mb-3">
                <label for="id_name" class="form-label">Destination Name</label>
                {{ form.name }}
              </div>

              <div class="mb-3">
                <label for="id_description" class="form-label">Description</label>
                {{ form.description }}
              </div>

              <div class="mb-3">
                <label for="id_location" class="form-label">Location</label>
                {{ form.location }}
              </div>
              <div class="mb-3">
                <label for="id_travel_type" class="form-label">Travel Type</label>
                {{ form.travel_type }}
              </div>
              <div class="mb-3">
                <label for="id_image" class="form-label">Upload Image</label>
                {{ form.image }}
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-success">Add Destination</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
