{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width:700px; margin:auto;">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="row">
            <button class="btn btn-primary" type="submit">Save</button>
            <a href="{% url 'jobs:admin-job-list' %}" class="btn btn-muted" style="text-decoration:none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
