{% extends 'base.html' %}
{% load static %}

{% block content %}
  <style>
    .container {
      width: 90%;
      max-width: 450px;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      margin: auto;
      padding: 10px;
    }
    
    .form-container {
      padding: 30px 25px;
    }
    
    h2 {
      color: #2c5282;
      margin-bottom: 25px;
      text-align: center;
      font-size: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4a5568;
    }
    
    input,
    select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus,
    select:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
    }
    
    .helptext {
      font-size: 12px;
      color: #718096;
      margin-top: 5px;
    }
    
    .errorlist {
      color: #c53030;
      font-size: 14px;
      margin-top: 5px;
      list-style-type: none;
      padding-left: 5px;
    }
    
    button {
      width: 100%;
      background-color: #4299e1;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    
    button:hover {
      background-color: #3182ce;
    }
    
    .form-footer {
      text-align: center;
      margin-top: 25px;
      color: #4a5568;
    }
    
    .form-footer a {
      color: #4299e1;
      text-decoration: none;
      font-weight: 600;
    }
    
    .form-footer a:hover {
      text-decoration: underline;
    }
    
    .language-icons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 15px;
    }
    
    .language-icons i {
      font-size: 24px;
      color: #4299e1;
    }
    
    .benefits {
      background-color: #ebf8ff;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 25px;
    }
    
    .benefits h3 {
      color: #2c5282;
      font-size: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
    }
    
    .benefits h3 i {
      margin-right: 8px;
    }
    
    .benefits ul {
      padding-left: 25px;
      color: #4a5568;
      font-size: 14px;
    }
    
    .benefits li {
      margin-bottom: 5px;
    }
  </style>

  <div class="container">
    <div class="form-container">
      <h2>Create Your Account</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
      </form>
      <div class="form-footer">
        <p>
          Already have an account? <a href="{% url 'accounts:login' %}">Login here</a>
        </p>
      </div>
      <div class="language-icons">
        <i class="fas fa-book-open"></i>
        <i class="fas fa-comments"></i>
        <i class="fas fa-graduation-cap"></i>
      </div>
    </div>
  </div>
{% endblock %}
