{% extends 'base.html' %}
{% load static %}

{% block content %}
  <style>
    .container {
      max-width: 450px;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      margin: auto;
      padding: 10px;
    }
    
    .header {
      background-color: #2c5282;
      color: white;
      padding: 25px 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .header h1 i {
      margin-right: 10px;
      color: #63b3ed;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .form-container {
      padding: 30px 25px;
    }
    
    h2 {
      color: #2c5282;
      margin-bottom: 25px;
      text-align: center;
      font-size: 24px;
    }
    
    .error-message {
      background-color: #fed7d7;
      color: #c53030;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }
    
    .error-message i {
      margin-right: 10px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4a5568;
    }
    
    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
    }
    
    button {
      width: 100%;
      background-color: #4299e1;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    
    button:hover {
      background-color: #3182ce;
    }
    
    .form-footer {
      text-align: center;
      margin-top: 25px;
      color: #4a5568;
    }
    
    .form-footer a {
      color: #4299e1;
      text-decoration: none;
      font-weight: 600;
    }
    
    .form-footer a:hover {
      text-decoration: underline;
    }
    
    .language-icons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 15px;
    }
    
    .language-icons i {
      font-size: 24px;
      color: #4299e1;
    }
  </style>

  <div class="container">
    <div class="form-container">
      <h2>Login to Your Account</h2>
      {% if error %}
        <div class="error-message">
          <i class="fas fa-exclamation-circle"></i>
          <span>{{ error }}</span>
        </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" name="email" required placeholder="your.email@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" name="password" required placeholder="Enter your password" />
        </div>
        <button type="submit">Login</button>
      </form>
      <div class="form-footer">
        <p>
          Don't have an account? <a href="{% url 'accounts:signup' %}">Sign up here</a>
        </p>
      </div>
      <div class="language-icons">
        <i class="fas fa-book-open"></i>
        <i class="fas fa-comments"></i>
        <i class="fas fa-graduation-cap"></i>
      </div>
    </div>
  </div>
{% endblock %}
