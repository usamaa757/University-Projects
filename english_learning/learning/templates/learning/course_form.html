{% extends 'base.html' %}
{% load static %}

{% block content %}
  <style>
    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #4299e1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
      display: inline-block;
      cursor: pointer;
      border: none;
      font-family: 'Poppins', sans-serif;
    }
    
    .btn-primary {
      background-color: #4299e1;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #3182ce;
    }
    
    .btn-outline {
      border: 2px solid #4299e1;
      color: #4299e1;
      background-color: transparent;
    }
    
    .btn-outline:hover {
      background-color: #4299e1;
      color: white;
    }
    
    /* Main Content */
    main {
      flex: 1;
      padding: 40px 0;
    }
    
    .form-container {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .form-header {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .form-header i {
      font-size: 28px;
      color: #4299e1;
      margin-right: 15px;
    }
    
    .form-header h1 {
      font-size: 28px;
      color: #2d3748;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #4a5568;
    }
    
    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
    }
    
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    
    .helptext {
      font-size: 14px;
      color: #718096;
      margin-top: 5px;
    }
    
    .errorlist {
      color: #e53e3e;
      font-size: 14px;
      margin-top: 5px;
      list-style-type: none;
      padding-left: 5px;
    }
    
    .form-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }
    
    /* Responsive Styles */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        padding: 15px;
      }
    
      .logo {
        margin-bottom: 15px;
      }
    
      nav ul {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
    
      nav ul li {
        margin: 5px 0;
      }
    
      .user-menu {
        margin-top: 15px;
        width: 100%;
        justify-content: center;
      }
    
      .form-actions {
        flex-direction: column;
        gap: 15px;
      }
    
      .form-actions .btn {
        width: 100%;
      }
    }
  </style>

  <!-- Main Content -->
  <main>
    <div class="container">
      <div class="form-container">
        <div class="form-header">
          <i class="fas fa-book-open"></i>
          <h1>{{ form.instance.pk|yesno:'Edit Course,Add Course' }}</h1>
        </div>
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="form-actions">
            <a href="{% url 'learning:course_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Courses</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Course</button>
          </div>
        </form>
      </div>
    </div>
  </main>
{% endblock %}
