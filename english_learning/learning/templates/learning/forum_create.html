{% extends 'base.html' %}
{% block content %}
  <style>
    /* Layout */
    .container {
      display: flex;
      flex: 1;
    }
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .container1 {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Page Header */
    .page-header {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transform: translate(50px, -50px);
    }
    .page-title {
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .page-title i {
      margin-right: 15px;
      color: white;
      font-size: 28px;
    }
    .page-description {
      font-size: 16px;
      opacity: 0.9;
    }
    
    /* Forum Topics & Posts */
    .topics-list {
      margin-top: 20px;
    }
    .topic-card {
      background: var(--card-bg);
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
    }
    .topic-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .topic-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .topic-card a {
      text-decoration: none;
      color: var(--primary-color);
    }
    .topic-card a:hover {
      text-decoration: underline;
    }
    .topic-card p {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0;
    }
    .posts {
      margin-top: 20px;
    }
    .post {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }
    .post .reply {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
    }
    form textarea,
    input[type='text'] {
      width: 100%;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    
    /* Lesson/Live session styling for consistency */
    .lesson-container,
    .lesson-actions,
    .lesson-header,
    .lesson-content,
    .lesson-detail-actions,
    .media-section,
    .media-card {
      all: inherit;
    }
    .lesson-container:hover,
    .media-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }
    
    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      font-size: 14px;
    }
    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }
    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background-color: var(--secondary-color);
      color: white;
    }
    .btn-secondary:hover {
      background-color: #3aa6c4;
      transform: translateY(-2px);
    }
    .btn-danger {
      background-color: var(--danger-color);
      color: white;
    }
    .btn-outline {
      background-color: transparent;
      color: var(--primary-color);
      border: 2px solid var(--primary-color);
    }
    .btn-outline:hover {
      background-color: var(--primary-color);
      color: white;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        top: 0;
        padding: 15px 0;
      }
      .page-title {
        font-size: 24px;
      }
      .topic-card,
      .post {
        padding: 15px;
      }
      form textarea {
        font-size: 14px;
      }
    }
  </style>

  <div class="container">
    <main class="main-content">
      <div class="container1">
        <div class="page-header">
          <h1 class="page-title"><i class="fas fa-plus"></i> Create Forum Topic</h1>
          <p class="page-description">Add a new discussion topic for students.</p>
        </div>
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Topic</button>
        </form>
      </div>
    </main>
  </div>
{% endblock %}
