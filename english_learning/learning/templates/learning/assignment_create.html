{% extends 'base.html' %}
{% block content %}
  <style>
    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    /* Page Header */
    .page-header {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
      padding: 25px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
    }
    
    .page-header h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
    }
    
    /* Form Container */
    form {
      background: #feffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }
    
    /* Form Fields */
    form p {
      margin-bottom: 15px;
    }
    
    input[type='text'],
    input[type='number'],
    input[type='date'],
    textarea,
    select,
    input[type='file'] {
      width: 100%;
      padding: 12px 15px;
      margin-top: 5px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    
    input:focus,
    textarea:focus,
    select:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
      outline: none;
    }
    
    /* Submit Button */
    .btn-primary {
      background-color: #4299e1;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn-primary:hover {
      background-color: #3182ce;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 0 10px;
      }
      .btn-primary {
        width: 100%;
      }
    }
  </style>

  <div class="page-header">
    <h2>Create Assignment for {{ lesson.title }}</h2>
  </div>

  <div class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Create Assignment</button>
    </form>
  </div>
{% endblock %}
