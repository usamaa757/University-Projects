{% extends 'base.html' %}
{% block title %}
  Quiz Result
{% endblock %}

{% block content %}
  <div class="quiz-result-page">
    <div class="result-card">
      <h1 class="quiz-title">🏆 {{ quiz.title }} - Result</h1>

      <div class="score-section">
        <p class="score-label">Your Score</p>
        <p class="score-value">{{ score }} / {{ total }}</p>
      </div>

      <a href="{% url 'quiz_list' %}" class="btn btn-primary">⬅️ Back to Quizzes</a>
    </div>
  </div>
{% endblock %}
