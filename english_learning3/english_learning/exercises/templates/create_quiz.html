{% extends 'base.html' %}

{% block title %}
  Create Quiz
{% endblock %}

{% block content %}
  <div class="create-quiz-page">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">📝 Create a New Quiz</h1>
      <p class="page-subtitle">Fill in the details below to add a new quiz for your students.</p>
    </div>

    <!-- Form -->
    <div class="form-card">
      <form method="post" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create Quiz</button>
      </form>
    </div>
  </div>
{% endblock %}
