{% extends "base.html" %}

{% block title %}Contact Owner{% endblock %}

{% block content %}
    <h1>Contact About: {{ post.title }}</h1>
    
    <div style="max-width: 600px; margin: 0 auto;">
        <div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
            <h3>Item Details:</h3>
            <p><strong>Type:</strong> <span class="badge {% if post.type == 'lost' %}badge-lost{% else %}badge-found{% endif %}">{{ post.type|upper }}</span></p>
            <p><strong>Category:</strong> {{ post.category }}</p>
            <p><strong>Location:</strong> {{ post.location }}</p>
            <p><strong>Posted by:</strong> {{ post.full_name }}</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
            </div>
            
            <div style="text-align: center;">
                <button type="submit" class="btn btn-success">Send Message</button>
                <a href="{{ url_for('item_detail', item_id=post.id) }}" class="btn">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
