<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .navbar-nav .nav-item {
            margin-left: auto;
        }
        
        .logout-btn {
            color: #fff;
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .logout-btn:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="{{ url_for('dashboard') if 'user_id' in session else url_for('index') }}">
            {% if 'user_id' in session %}
                Dashboard
            {% else %}
                Automated Service Hunting Tool
            {% endif %}
        </a>
        <ul class="navbar-nav ml-auto">
            {% if 'user_id' in session %}
                <li class="nav-item">
                    <strong class="navbar-text text-white mr-3">Welcome, {{ user[1] }}</strong>
                </li>
                <li class="nav-item">
                    <a class="logout-btn btn" href="{{ url_for('logout') }}">Logout</a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('login') }}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('register') }}">Register</a>
                </li>
            {% endif %}
        </ul>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
