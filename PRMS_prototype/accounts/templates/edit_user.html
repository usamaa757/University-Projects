{% extends 'layout.html' %}

{% block content %}
  <div class="container mt-4 round shadow border p-3" style="max-width: 600px;">
    <h3 class="text-center">Edit User</h3>

    {% if messages %}
      {% for message in messages %}
        <div class=" {% if message.tags == 'success' %}
            
            
            
            
            
            
            
            text-success







          {% else %}
            
            
            
            
            
            
            
            text-danger







          {% endif %}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label for="{{ form.email.id_for_label }}" class="form-label">Email</label>
        {{ form.email }}
      </div>

      <div class="mb-3">
        <label for="{{ form.role.id_for_label }}" class="form-label">Role</label>
        {{ form.role }}
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-success">Update User</button>
      </div>
    </form>
  </div>
{% endblock %}
