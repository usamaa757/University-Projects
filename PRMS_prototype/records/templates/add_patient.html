{% extends 'layout.html' %}
{% block content %}

    <h3 class="text-center">Add Patient Record</h3>

      {% csrf_token %}
      {{ form.as_p }}
      <div class="text-center">
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
{% endblock %}
