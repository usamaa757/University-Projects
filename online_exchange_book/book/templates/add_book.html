<div class="wrapper">
  {% include 'includes/sidebar.html' %}
  <div class="main">
    {% include 'includes/header.html' %}
    <div class="container-fluid mt-5">
      <div class="row">
        <div class="col-md-12 ms-sm-auto col-lg-12 px-md-4 py-5py-5">
          <div class="row justify-content-center">
            <div class="col-md-8">
              <div class="card form-card shadow-lg">
                <div class="card-header form-card-header text-center">
                  <h5 class="mb-0">Add New Book</h5>
                </div>
                <div class="card-body">
                  {% if messages %}
                  {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                  {% endfor %}
                  {% endif %}
                  <form method="POST" enctype="multipart/form-data" class="p-3">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="text-center mt-4">
                      <button type="submit" class="form-btn w-100">Add Book</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include 'includes/footer.html' %}
