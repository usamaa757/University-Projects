<div class="wrapper">
  {% include 'includes/sidebar.html' %}
  <div class="main">
    {% include 'includes/header.html' %}
  <div class="container-fluid mt-5">
    <div class="row">
      <div class="col-md-12 ms-sm-auto col-lg-12 px-md-4 py-5py-4">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="form-card shadow-lg">
              <div class="card-header form-card-header text-center">
                <h3>Edit Book</h3>
              </div>
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}

              <div class="card form-card shadow-lg mb-4">
                <div class="card-body p-4">
                  <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">{{ form.as_p }}</div>
                    <div class="text-center">
                      <button type="submit" class="form-btn w-100 mt-3">Save Changes</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {% include 'includes/footer.html' %}
