<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center" style="width: 400px;">
      <h2 class="text-success">Password Reset Successful</h2>
      <p class="text-muted">Your password has been successfully changed. You can now log in with your new password.</p>

      <a href="{% url 'login' %}" class="btn btn-primary w-100">Go to Login</a>
    </div>
  </body>
</html>
