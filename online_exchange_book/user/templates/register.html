{% include 'includes/header.html' %}
<br />
<br />
<div class="container mt-5 form-container">
  <div class="card form-card">
    <div class="card-header form-card-header">Register</div>
    <div class="card-body">
      <!-- Display Django Messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control input-field" required />
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control input-field" required />
        </div>

        <!-- Password -->

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control input-field" required />
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control input-field" required />
        </div>

        <!-- Profile Picture -->
        <div class="mb-3">
          <label class="form-label">Profile Picture</label>
          <input type="file" name="profile_picture" class="form-control input-field" required />
        </div>

        <!-- User Type -->
        <div class="mb-3">
          <label class="form-label">User Type</label>
          <select name="user_type" class="form-control input-field" required>
            <option value="Owner">Owner</option>
            <option value="Seeker">Seeker</option>
          </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn form-btn w-100">Register</button>
      </form>

      <p class="text-center mt-3">
        Already have an account? <a href="{% url 'login' %}" class="form-link">Login</a>
      </p>
    </div>
  </div>
</div>

{% include 'includes/footer.html' %}
